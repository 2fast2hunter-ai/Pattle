name: Deploy Firebase Rules & Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

jobs:
  firebase-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Functions
        run: |
          # Derive the service account email from the credentials JSON so it can act as itself
          SA_EMAIL=$(echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' | node -e "const c=[]; process.stdin.on('data',x=>c.push(x)); process.stdin.on('end',()=>console.log(JSON.parse(Buffer.concat(c).toString()).client_email));")
          gcloud functions deploy createPaperclipIssueFromFeedback \
            --runtime nodejs20 \
            --trigger-event providers/cloud.firestore/eventTypes/document.create \
            --trigger-resource "projects/pattle-6edea/databases/(default)/documents/feedback/{feedbackId}" \
            --source ./functions \
            --entry-point createPaperclipIssueFromFeedback \
            --service-account "$SA_EMAIL" \
            --region us-central1 \
            --project pattle-6edea \
            --no-gen2 \
            --quiet
