name: Deploy Firebase Rules & Functions

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'functions/**'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

jobs:
  firebase-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules
        run: npx -y firebase-tools@12 deploy --only firestore:rules --project pattle-6edea --non-interactive

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        run: npx -y firebase-tools@12 deploy --only functions:createPaperclipIssueFromFeedback --project pattle-6edea --non-interactive
