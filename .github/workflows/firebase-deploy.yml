name: Deploy Firebase Rules & Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  firebase-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        run: |
          # Strip any whitespace/newlines that may have been included when copying the token
          CLEAN_TOKEN=$(printf '%s' "$RAW_FIREBASE_TOKEN" | tr -d '[:space:]')
          FIREBASE_TOKEN="$CLEAN_TOKEN" npx -y firebase-tools@13 deploy --only functions --project pattle-6edea --non-interactive
        env:
          RAW_FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
