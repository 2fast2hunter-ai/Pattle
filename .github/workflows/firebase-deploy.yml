name: Deploy Firebase Rules & Functions

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'functions/**'
  workflow_dispatch:

jobs:
  firebase-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Firestore rules
        run: npx -y firebase-tools@latest deploy --only firestore:rules --project pattle-6edea --non-interactive

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        run: npx -y firebase-tools@latest deploy --only functions --project pattle-6edea --non-interactive
