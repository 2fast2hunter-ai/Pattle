name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pattle-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: Pattle ${{ github.ref_name }}
          body: |
            ## Pattle ${{ github.ref_name }}

            ### How to install on Android (sideloading)
            1. Download `app-release-unsigned.apk` below
            2. On your Android phone, go to **Settings → Security** (or Privacy) and enable **Install unknown apps** for your browser or file manager
            3. Open the downloaded APK file and tap **Install**
            4. Launch Pattle from your app drawer
