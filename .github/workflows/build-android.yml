name: Build Android

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # workflow_dispatch uses selected profile; push to main/tags defaults to production
      BUILD_PROFILE: ${{ github.event.inputs.profile || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── development: debug APK, no signing required ───────────────────────
      - name: Build debug APK (development)
        if: env.BUILD_PROFILE == 'development'
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK (development)
        if: env.BUILD_PROFILE == 'development'
        uses: actions/upload-artifact@v4
        with:
          name: pattle-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── preview + production: decode signing keystore ─────────────────────
      - name: Decode keystore
        if: env.BUILD_PROFILE == 'preview' || env.BUILD_PROFILE == 'production'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/pattle-upload.p12
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
            echo "ANDROID_KEYSTORE_PATH=/tmp/pattle-upload.p12" >> $GITHUB_ENV
          else
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
          fi

      # ── preview: signed APK for direct device installation (sideloading) ──
      - name: Build signed APK (preview)
        if: env.BUILD_PROFILE == 'preview' && env.KEYSTORE_AVAILABLE == 'true'
        run: cd android && ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload signed APK (preview)
        if: env.BUILD_PROFILE == 'preview' && env.KEYSTORE_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pattle-preview-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # ── production: signed AAB for Google Play ────────────────────────────
      - name: Build signed AAB (production)
        if: env.BUILD_PROFILE == 'production' && env.KEYSTORE_AVAILABLE == 'true'
        run: cd android && ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build unsigned AAB fallback (production, no keystore)
        if: env.BUILD_PROFILE == 'production' && env.KEYSTORE_AVAILABLE != 'true'
        run: cd android && ./gradlew bundleRelease

      - name: Upload AAB artifact (production)
        if: env.BUILD_PROFILE == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: pattle-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play internal track (branch push)
        if: env.BUILD_PROFILE == 'production' && env.KEYSTORE_AVAILABLE == 'true' && !startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5  # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.pattle.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Upload to Google Play production track (version tag, attempt 1)
        id: play_upload_1
        if: env.BUILD_PROFILE == 'production' && env.KEYSTORE_AVAILABLE == 'true' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5  # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.pattle.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Upload to Google Play production track (version tag, attempt 2)
        if: env.BUILD_PROFILE == 'production' && env.KEYSTORE_AVAILABLE == 'true' && startsWith(github.ref, 'refs/tags/v') && steps.play_upload_1.outcome == 'failure'
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5  # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.pattle.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Create GitHub Release
        if: env.BUILD_PROFILE == 'production' && startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_AVAILABLE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          name: Pattle ${{ github.ref_name }}
          body: |
            ## Pattle ${{ github.ref_name }}

            ### Google Play
            This release has been submitted to the [production track](https://play.google.com/console) on Google Play and is pending review.

            ### How to install on Android (sideloading)
            Download and install the AAB directly if you have the tools, or wait for the Google Play release to propagate.
        continue-on-error: true
