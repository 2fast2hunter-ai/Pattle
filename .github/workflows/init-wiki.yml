name: Initialize Pattle Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Push all wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.email "2fast2hunter@gmail.com"
          git config --global user.name "2fast2hunter-ai"
          mkdir wiki && cd wiki
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          cat > Home.md << 'ENDOFFILE'
# Welcome to the Pattle Wiki

**Pattle** is a free browser-based pet collection game blending turn-based monster battles, idle village building, and a deep breeding system.
Play now: https://2fast2hunter-ai.github.io/Pattle/

## Quick Start — 5 Steps

1. **Complete the tutorial** — 12-step onboarding covers battles, breeding, and village basics.
2. **Build your team** — collect pets from 26 elemental types; add up to 3 to your active team.
3. **Battle in the Arena** — fight opponents for XP, gold, and leaderboard rank.
4. **Breed your pets** — combine two pets in the Breeding Lab; hatch eggs with inherited traits.
5. **Upgrade your village** — buildings generate Gold, Wood, and Stone even while offline.

## Wiki Pages

| Page | Contents |
|------|----------|
| [Getting Started](Getting-Started) | Tutorial walkthrough, first pet, first battle, first hatch |
| [Pet System](Pet-System) | 26 element types, rarity tiers, stats, leveling |
| [Breeding Lab](Breeding-Lab) | How to breed, hatchery timers, fusion recipes |
| [Battle System](Battle-System) | Turn order, type chart, Arena/Tower/Gauntlet/Auto-battle |
| [Village and Idle Economy](Village-and-Idle-Economy) | Buildings, resources, upgrade paths, offline income |
| [Season 1 Pets](Season-1-Pets) | 10 launch-season pets with elements and rarity |

## At a Glance

- 26 element types — each beats 4 and loses to 4 (circular chart)
- 10 rarity tiers — Common through Transcendent
- 6 stats per pet — HP, ATK, DEF, AP, RES, SPEED
- Battle modes — Arena, Tower, Gauntlet, Friend Battles, Auto-battle
- Breeding genetics — 1% chance the child exceeds both parents' rarity
- Idle village — 7 building types running 24/7, even offline
- Free to play — no pay-to-win; ads are optional (hatch speed-ups only)

*Last updated: Season 1*
