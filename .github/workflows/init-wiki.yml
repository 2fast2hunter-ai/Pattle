# Season 1 Pets

*Deutsch weiter unten.*

Season 1 marks the Pattle launch roster. These 10 pets were the featured collectibles at game launch, each representing a core elemental identity.

## The 10 Season 1 Pets

| # | Pet | Element | Rarity | How to Obtain |
|---|-----|---------|--------|---------------|
| 1 | Fire Phoenix | Fire | Rare | Lootbox, Breeding (Fire parents) |
| 2 | Water Shark | Water | Common | Lootbox, Starter pool |
| 3 | Nature Wolf | Nature | Uncommon | Lootbox, Breeding |
| 4 | Thunder Bird | Electric | Rare | Lootbox, Breeding (Electric parents) |
| 5 | Ice Yeti | Ice | Uncommon | Lootbox, Breeding |
| 6 | Dark Dragon | Dark | Epic | Lootbox (rare), Breeding (Dark parents) |
| 7 | Magic Unicorn | Magic | Epic | Lootbox (rare), Fusion breeding |
| 8 | Earth Elephant | Earth | Common | Lootbox, Starter pool |
| 9 | Ghost Spirit | Ghost | Uncommon | Lootbox, Breeding |
| 10 | Light Pegasus | Light | Rare | Lootbox, Breeding (Light parents) |

## Pet Spotlights

**Fire Phoenix (Fire / Rare)** — the Season 1 mascot. High AP and solid SPEED make it a strong elemental sweeper. Counters Void, Chaos, Order, and Divine types.

**Dark Dragon (Dark / Epic)** — balanced ATK and DEF with above-average HP. Counters Ghost, Magic, Psychic, and Fighting types.

**Magic Unicorn (Magic / Epic)** — exceptional AP with wide type coverage. Obtainable through specific Magic-type fusion combinations.

**Earth Elephant (Earth / Common)** — the tankiest Common in Season 1. Enormous HP and DEF; slow but nearly impossible to one-shot. Great for new players learning combat.

## Rarity Breakdown

| Rarity | Count | % of Roster |
|--------|-------|-------------|
| Common | 2 | 20% |
| Uncommon | 3 | 30% |
| Rare | 3 | 30% |
| Epic | 2 | 20% |

## How to Obtain Season 1 Pets

All 10 are in the standard pool:

- **Daily Lootbox** — free box every 24 hours. Common and Uncommon Season 1 pets appear regularly.
- **Breeding** — pair two pets of the correct element type.
- **Arena Milestones** — rank-up rewards occasionally include Season 1 pets.

## Secret Hybrids

Beyond the 10 base pets, 15 **secret hybrid pets** are obtainable only through specific breeding combinations. See [Breeding Lab](Breeding-Lab) for hints.

## Deutsch — Saison-1-Pets

Saison 1 enthalt **10 Featured-Pets**: Fire Phoenix (Feuer, Selten), Water Shark (Wasser, Gewohnlich), Nature Wolf (Natur, Ungewohnlich), Thunder Bird (Elektro, Selten), Ice Yeti (Eis, Ungewohnlich), Dark Dragon (Dunkel, Episch), Magic Unicorn (Magie, Episch), Earth Elephant (Erde, Gewohnlich), Ghost Spirit (Geist, Ungewohnlich) und Light Pegasus (Licht, Selten). Alle uber Lootboxen und Zucht erhaltlich. Zusatzlich gibt es 15 geheime Hybrid-Pets uber spezielle Typen-Kombinationen.
