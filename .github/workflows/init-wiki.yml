# Breeding Lab

*Deutsch weiter unten.*

## How to Breed

1. Go to **Breeding Lab** from the main menu.
2. Select **two parent pets** (both must meet minimum level for their rarity).
3. Tap **Breed**. An egg appears in the Hatchery with a countdown.
4. Wait for the timer, then tap the egg to hatch.

Both parents enter a **breed cooldown** after breeding. You need a free Hatchery slot.

## Hatchery Timers

| Rarity | Hatch Time |
|--------|-----------|
| Common | 10 seconds |
| Uncommon | 5 minutes |
| Rare | 30 minutes |
| Epic | 1 hour |
| Legendary | 2 hours |
| Mythic | 4 hours |
| Divine | 8 hours |
| Ancient | 12 hours |
| Cosmic | 18 hours |
| Transcendent | 24 hours |

Watch an optional ad to speed up any hatch timer.

## Genetics

- Child rarity falls between the two parents' rarities (at or above the lower parent).
- **1% chance** the child's rarity exceeds both parents.
- Stats blend from both parents with slight randomness.
- Element type is inherited from one parent (randomly), unless a fusion recipe applies.

## Fusion Recipes (Key Combinations)

| Parent A | Parent B | Result | Rarity |
|----------|----------|--------|--------|
| Fire | Water | Steam Serpent | Epic |
| Fire | Dragon | Red Dragon | Legendary |
| Water | Ice | Frost Hydra | Rare |
| Nature | Earth | Ancient Treant | Epic |
| Electric | Metal | Thunder Golem | Rare |
| Light | Magic | Arcane Herald | Epic |
| Dark | Ghost | Shadow Phantom | Rare |
| Psychic | Time | Chrono Seer | Epic |
| Tech | Electric | Cyber Hawk | Rare |
| Space | Void | Nebula Wraith | Legendary |

27 standard fusions exist in total. Experiment to find the rest.

## Secret Hybrids

Nine secret recipes produce unique named pets unavailable through other means:

- The rarest secret fusion requires combining **Chaos + Order** — something beyond both. 🌌
- Secret hybrids require **Epic+ parents** in most cases.
- Most secret hybrids are **Legendary rarity or higher**.

Full spoilers are withheld — discovery is part of the fun.

## Tips

- Pair high-level parents for better child stats.
- Use multiple Hatchery slots simultaneously — breed multiple pairs at once.
- Breed Tickets (from Special Workshop) instantly reset a parent's cooldown.

## Deutsch — Zuchtstation

Wahle zwei Eltern-Pets mit ausreichendem Level. Nach dem Bruten erscheint ein Ei in der **Brutanlage** mit einem Countdown. Das Kind erbt Typ und Werte beider Eltern — mit 1% Chance ubertrifft es sogar die Seltenheit beider Eltern. Bestimmte Typen-Kombinationen erzeugen spezielle **Fusions-Hybriden**. Es gibt 27 dokumentierte und 9 geheime Rezepte.
