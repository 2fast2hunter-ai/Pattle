# Village and Idle Economy

*Deutsch weiter unten.*

## How Idle Income Works

Your village generates resources **automatically**, even while the game is closed. Every building produces specific resources based on:

- **Building level** (higher = more output)
- **Pets assigned** as workers (higher rarity = bigger yield multiplier)
- **Offline accumulation** up to the building's storage cap

Come back daily to collect before storage fills up.

## Resource Buildings (7 Types)

| Building | Resources | Notes |
|----------|-----------|-------|
| Forest | Wood, Berries, Resin | Available from start |
| Quarry | Stone, Coal, Iron, Diamond, Emerald | Available from start |
| Harbor | Fish, Pearls, Coral, Kelp | Unlocked later |
| Observatory | Stardust, Crystals, Meteorite | Unlocked later |
| Server Farm | Circuit Boards, Chips, Code Fragments | Unlocked later |
| Special Workshop | Special resources (for Shop offers) | Unlocked later |
| Training Ground | XP Potions, Breed Tickets | Unlocked later |

Each building accepts only specific pet **element types** as workers. Matching type to building increases yield significantly.

## Building Upgrade Path (15 Levels)

| Tier | Levels | Cost |
|------|--------|------|
| Starter | 1–5 | Low Gold |
| Mid | 6–10 | Moderate Gold |
| Advanced | 11–15 | Gold + special resources |

Formula: ~1,000 × 10^(level-2) Gold per upgrade. Levels 11+ also require materials from higher-tier buildings.

### Priority Order
1. **Quarry** first — Stone and Iron are needed for later upgrades.
2. **Forest** second — Wood is a universal material.
3. **Harbor** and **Observatory** when unlocked — rarest resources.

## Rarity Multipliers

| Pet Rarity | Yield Multiplier |
|------------|-----------------|
| Common | 1x |
| Uncommon | ~1.2x |
| Rare | ~1.5x |
| Epic | ~2x |
| Legendary+ | ~3x+ |

Assign your highest-rarity pets of the correct type to maximize output.

## Trade Recipes

The **Trading Post** lets you convert excess resources into ones you need. 26 trade recipes are available — open the Trading Post to see current exchange rates.

## Special Shop Offers

Spend Special Workshop resources on:

| Item | Effect |
|------|--------|
| Ad Ticket | Skip an ad prompt; watch it later for full reward |
| Breed Ticket | Instantly reset a pet's breed cooldown |
| Large XP Potion | Big XP burst for one pet |
| Shiny Potion | Cosmetic shiny effect on any pet |

## Daily Loop

```
Log in
  Collect idle resources from all buildings
  Open free daily lootbox (Shop)
  Check daily and weekly quests
  Battle in Arena (XP + Gold)
  Breed and check Hatchery
  Spend resources on upgrades
Log out — idle income keeps running
```

## Tips

- Collect at least once daily so storage never overflows.
- Match pet types to building types — a mismatch costs 50% or more yield.
- Breed Tickets are the most valuable Special Workshop item for active breeders.
- Upgrade storage alongside production so you don't waste idle time.

## Deutsch — Dorf und Idle-Wirtschaft

Dein Dorf produziert Ressourcen automatisch, auch offline. Es gibt 7 Gebaudetypen mit je 15 Upgrade-Stufen. Weise passende Pets als Arbeiter zu — hohere Seltenheit = hohere Ausbeute. Tausche uberschussige Ressourcen an der **Handelsstatte** gegen benotigte Materialien. Komm taglich zuruck, bevor der Speicher voll ist.
ENDOFFILE

