## Stats

| Stat | Role |
|------|------|
| HP | Total health — reaches 0 means knocked out |
| ATK | Physical attack power |
| DEF | Physical defense — reduces ATK damage |
| AP | Special attack (Ability Power) — for elemental moves |
| RES | Special defense (Resistance) — reduces AP damage |
| SPEED | Determines turn order; highest SPEED acts first |

Stats scale with level and rarity. A level 20 Common often beats a level 5 Rare.

## Leveling

Pets earn XP from Arena wins, Tower/Gauntlet clears, quests, and XP potions. Each level increases all base stats. Level thresholds unlock breeding eligibility (see rarity table above).

**Tip:** Level your core team of 3 first. Depth beats width early in the game.

