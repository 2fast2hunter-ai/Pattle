# Battle System

*Deutsch weiter unten.*

## Turn Order — SPEED Stat

Pattle uses **turn-based combat**. The pet with the highest **SPEED** attacks first. Equal SPEED = random order. Build a fast team to land first hits every round.

## Elemental Effectiveness

| Matchup | Damage |
|---------|--------|
| Attacker has advantage | 2x |
| Neutral | 1x |
| Attacker is at disadvantage | 0.5x |

The 26 types form a circular chain — each beats 4 and loses to 4. See [Pet System](Pet-System) for the full chart.

## Battle Modes

### Arena
Standard matchmade mode. Win to earn Gold, XP, and Arena Points that determine your leaderboard rank. No stamina cost — battle freely.

### Tower
Single-player challenge with **escalating difficulty floors**. Each floor rewards Gold, XP, and rare items. No healing between floors. Reach high floors to climb the Tower Leaderboard. Some floors have special modifiers (all-Fire enemies, double-SPEED rules, etc.).

### Gauntlet
**Survival run** — fight waves back-to-back. Your pets carry over their HP from the previous fight. Score = waves cleared. Great for farming XP and items in bulk.

### Auto-Battle
Enable in Arena to let the AI fight for you. The AI chooses moves based on type effectiveness. Useful for grinding while idle — rewards are identical to manual battles.

### Friend Battles
Challenge any player on your friends list to direct PvP. No ranking points change hands — purely for fun and bragging rights.

## Team Building

### Core Rules
1. **Never run 3 pets of the same type** — one counter sweeps you.
2. **Balance SPEED and power** — fast sweeper + high-ATK attacker + high-HP tank.
3. **Type diversity** — 3 different types covers more favorable matchups.

### Roles

| Role | Priority Stats |
|------|---------------|
| Sweeper | SPEED then ATK/AP |
| Tank | HP then DEF and RES |
| Coverage | SPEED then type spread |

### Templates
- **Balanced:** fast sweeper + mid-SPEED all-rounder + slow tank
- **Speed Rush:** three high-SPEED pets — win before the opponent acts
- **Type Triangle:** three types covering each other's weaknesses

## Tips

- Knowing the type chart is the single biggest skill advantage.
- In Tower/Gauntlet, damage-over-time effects stack across waves.
- Auto-battle is not optimal for hard fights — use manual control.
- Save your fastest pet for last when losing; it may outspeed the surviving enemies.

## Deutsch — Kampfsystem

**GES (Geschwindigkeit)** bestimmt die Angreifreihenfolge. Elementtypen verandern den Schaden: Vorteil 2x, Nachteil 0,5x. Modi: **Arena** (Ranglisten-PvP), **Turm** (aufsteigende Schwierigkeit), **Gauntlet** (Uberlebensmodus), **Auto-Kampf** (KI-gesteuert) und **Freundeskampf**. Baue ein Team aus 3 verschiedenen Typen, um Schwachen abzudecken.
ENDOFFILE

