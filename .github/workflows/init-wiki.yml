# Getting Started

*Deutsch weiter unten.*

## Tutorial Walkthrough (12 Steps)

| Step | Action |
|------|--------|
| 1 | Welcome — meet your first pet |
| 2 | Pet Hub — navigate to your collection |
| 3 | Add to team — place your starter on the battle team |
| 4 | Arena Hub — open the battle area |
| 5 | Start a battle — launch your first Arena fight |
| 6 | Fight — execute your first attack |
| 7 | Win — claim victory rewards |
| 8 | Breeding Lab — navigate to the Breeding screen |
| 9 | Select parents — pick two pets to breed |
| 10 | Breed — start the egg incubation timer |
| 11 | Hatchery — hatch your egg |
| 12 | Village — collect your first idle resources |

## Your First Pet

Every new player starts with a Common-rarity starter pet. Its element is random. Don't stress about type — you'll collect many more through battles, breeding, and lootboxes.

**Tip:** Open the free daily lootbox in the Shop immediately. It awards a random pet or item every 24 hours.

## Your First Battle

1. Go to **Pet Hub** and tap **Add to Team**.
2. Open **Arena Hub** and tap **Quick Battle**.
3. Tap an attack. SPEED determines who goes first.
4. Defeat all enemy pets to win Gold and XP.

No stamina cost — battle as often as you want.

## Your First Hatch

1. Go to **Breeding Lab**, select two pets, tap **Breed**.
2. An egg appears in the Hatchery with a countdown timer.
3. Wait (or watch an optional ad to speed up).
4. Tap the egg to reveal your new pet.

## Progression Loop

```
Battle  → XP + Gold → level up pets
Breed   → hatch eggs → expand roster
Village → collect resources → upgrade buildings → grow faster
```

## Deutsch — Erste Schritte

Das Tutorial zeigt dir in **12 Schritten** Kämpfe, Zucht und Dorf-Management. Öffne täglich deine **Gratis-Lootbox** im Shop, kämpfe in der **Arena** für XP, züchte Pets in der **Zuchtstation** und sammle Ressourcen in deinem **Dorf**. Ziel: das stärkste Team aus 26 Elementtypen aufbauen und die globale Rangliste erklimmen.
