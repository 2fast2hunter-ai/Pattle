name: Init Pattle Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Create and push wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SCRIPT_B64: 
        run: |
          git config --global user.email "2fast2hunter@gmail.com"
          git config --global user.name "2fast2hunter-ai"
          mkdir wiki && cd wiki
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          echo "${SCRIPT_B64}" | base64 -d > generate_wiki.py
          python3 generate_wiki.py
          git add .
          git commit -m "Add Pattle game guide Season 1 (7 wiki pages)"
          git push -u origin HEAD:master --force
          echo "SUCCESS"